name: Continuos Integration - Teste

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install fastapi pylint

      - name: Rodar Pylint
        run: pylint --disable=all --enable=F,E --disable=E0401 main.py
