name: CI e CD 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. CI - Continuos Integration com Pylint
  continuos-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install fastapi pylint
      - name: Rodar Pylint
        run: pylint --disable=all --enable=F,E --disable=E0401 src/main.py

  # 2. CD - DELIVERY 
  continuos-delivery:
    runs-on: ubuntu-latest
    needs: continuos-integration
    steps:
      - uses: actions/checkout@v4
      - name: Criar Artefato
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado
          path: |
            main.py
            README.md

  # 3. DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: continuos-delivery
    steps:
      - name: Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: projetozipado
      - name: Listar arquivos (Simulando Deploy)
        run: ls -R
        
  # 4. DOCKER
  docker:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug
      
      - name: Build
        uses: docker/build-push-action@v7


# 5. TESTES
  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # IMPORTANTE: Garanta que httpx esteja aqui
          pip install fastapi uvicorn httpx pytest pytest-cov pytz
          # Instala as dependências do arquivo se existir
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Test with pytest
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest testes/testes.py


  # 6. ATUALIZAR HORA E DATA
  atualizar-readme:
    runs-on: ubuntu-latest
    needs: testes
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa todo o histórico para evitar erros de git

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Instalar dependências
        run: pip install pytz

      - name: Executar script de atualização
        run: python update_readme.py

      - name: Criar ou Atualizar Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: atualiza data no README"
          title: "Atualização Automática do README"
          body: "Pipeline executado com sucesso em Fazenda Rio Grande!"
          branch: "readme-update"
          base: "main" # Tenta mandar para a main

