name: CI e CD 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. CI - Continuos Integration com Pylint
  continuos-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install fastapi pylint
      - name: Rodar Pylint
        run: pylint --disable=all --enable=F,E --disable=E0401 main.py

  # 2. CD - DELIVERY 
  continuos-delivery:
    runs-on: ubuntu-latest
    needs: continuos-integration
    steps:
      - uses: actions/checkout@v4
      - name: Criar Artefato
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado
          path: |
            main.py
            README.md

  # 3. DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: continuos-delivery
    steps:
      - name: Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: projetozipado
      - name: Listar arquivos (Simulando Deploy)
        run: ls -R
        
  # 4. DOCKER
  docker:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug
      
      - name: Build
        uses: docker/build-push-action@v7

# 5. TESTES
  testes:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test with pytest
      run: |
        pip install pytest pytest-cov
        pytest testes/testes.py --doctest-modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest

