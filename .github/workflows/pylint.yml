name: CI, CD e Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. CI:
  continuos-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install fastapi pylint
      - name: Rodar Pylint
        run: pylint --disable=all --enable=F,E --disable=E0401 main.py

  # 2. Docker: 
  docker-build:
    runs-on: ubuntu-latest
    needs: continuos-integration
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t meu-projeto-fastapi .

  # 3. CD: Delivery
  continuos-delivery:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Criar Artefato
        uses: actions/upload-artifact@v4
        with:
          name: projetozipado
          path: |
            main.py
            README.md

  # 4. Deploy: 
  deploy:
    runs-on: ubuntu-latest
    needs: continuos-delivery
    steps:
      - name: Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: projetozipado
      - name: Listar arquivos
        run: ls -R
