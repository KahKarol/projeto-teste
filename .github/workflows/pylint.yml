name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        
    - name: Rodar Pylint
      # O ponto (.) diz ao Pylint para procurar arquivos .py em todas as pastas
      run: |
        pylint $(git ls-files '*.py')
